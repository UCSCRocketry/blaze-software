; PlatformIO — Blaze custom STM32F411CEU6
;
; Board: genericSTM32F411CE (HSI clock). See earlier notes on blackpill vs HSE.
;
; PA2 / PA3 on this PCB: magnetometer CS and radio INT — not a UART console.
; USB-C debug uses the chip’s USB FS (PA11/PA12), not PA2/PA3.

[env:genericSTM32F411CE]
platform = ststm32
board = genericSTM32F411CE
framework = arduino
upload_protocol = dfu
build_flags =
    -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -D USBCON
    -D ARDUINO_USB_CDC_ON_BOOTLOADER
    ; No global Serial1/Serial2/etc. so USART is not claimed on PA2/PA3 (mag CS, radio INT).
    ; Serial in sketches stays USB CDC (SerialUSB) for the USB-C port.
    -D PIO_FRAMEWORK_ARDUINO_SERIAL_WITHOUT_GENERIC
    ; SPI1 — CS_FLASH is PB8 in firmware; other CS_* are per-device in code
    -D PIN_SPI_MOSI=PA7
    -D PIN_SPI_MISO=PA6
    -D PIN_SPI_SCK=PA5
    -D PIN_SPI_SS=PA4
    ; I2C1 — SCL / SDA on PB6 / PB7 per schematic
    -D PIN_WIRE_SDA=PB7
    -D PIN_WIRE_SCL=PB6
    ; LED_BUILT_IN on schematic (PA8/PA9/PA10 are RGB — drive those in code by pin name)
    -D LED_BUILTIN=PC13
    ; HAL only; generic runtime clock still uses HSI until you add HSE clock code.
    -D HSE_VALUE=25000000U
lib_deps =
    https://github.com/sparkfun/SparkFun_KX13X_Arduino_Library.git
	adafruit/Adafruit BMP280 Library
	adafruit/Adafruit Unified Sensor
	adafruit/SdFat - Adafruit Fork@^2.3.102
	arduino-libraries/SD@^1.3.0
    mikem/RadioHead@^1.120
	adafruit/Adafruit SPIFlash@^5.1.1
